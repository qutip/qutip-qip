# .readthedocs.yaml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Set the version of Python and other tools you might need
build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  apt_packages:
    - pandoc
  jobs:
    # This can be removed once RTD configuration schema supports PEP 735 (https://peps.python.org/pep-0735/)
    pre_install:
      - python -m pip install --upgrade pip
      - python -m pip install .[full] --group doc

    pre_build:
      # Each command is executed in a new shell process
      - cd doc; python source/tutorials-website/create_tutorials_html.py

# Build documentation in the docs/ directory with Sphinx
sphinx:
  configuration: doc/source/conf.py
