name: Doctest
permissions:
  contents: read

on:
  push:
    branches: [ master ]
    paths: &trigger_paths
      - "doc/**"
      - "src/**/*.py"
      - ".github/workflows/doctest.yml" # Run when this exact pipeline file changes
      - "pyproject.toml" # Run when any dependency changes
  pull_request:
    paths: *trigger_paths

concurrency:
  group: doctest_${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
    doctest:
      runs-on: ubuntu-latest

      steps:
      - name: Clone the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[full] --group doc

      - name: Test code snippets in the documentation
        working-directory: doc
        run: |
          make doctest
