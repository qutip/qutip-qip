name: Doctest

on:
  push:
    branches: [ master ]
  pull_request:
    paths:
        - doc/*
        - src/*
        - '.github/workflows/lint.yml' # Run when this exact pipeline file changes

jobs:
    doctest:
        runs-on: ubuntu-latest

        steps:
        - uses: actions/checkout@v6
        - name: Set up Python
          uses: actions/setup-python@v6
          with:
            python-version: 3.12

        - name: Install dependencies
          run: |
            python -m pip install --upgrade pip
            python -m pip install scipy==1.14.0
            pip install .[graphics,control]

        - name: Test code examples for the pulse paper
          run: |
            cd pulse-paper
            for f in *.py; do python -W error "$f"; done
            # '-W error' will throw an error in case any warning is raised
